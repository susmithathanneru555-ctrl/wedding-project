{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wedding invitation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
      body {
        margin: 0;
        background-color: #fff;
        color: #222;
        font-family: inherit;
      }

      /* show the photo as a normal responsive image (not cropped) */
      .hero-img {
        width: 100%;
        height: auto; /* keep aspect ratio */
        display: block;
      }

  .content-box { width: 100%; max-width: 980px; padding: 1rem; margin: 1.5rem auto; }
  .content-box h1 { color: #222; }
      .btn-next { background-color: #ffc0cb; color: #222; border: none; padding: .375rem .75rem; border-radius: .25rem; }

  /* hero wrapper and heading overlay */
  .hero { position: relative; display: block; }
  .hero-heading { position: absolute; top: 8%; left: 50%; transform: translateX(-50%); z-index: 2; text-align: center; pointer-events: none; }
  .hero-heading h1 { margin: 0; color: #521ad7; text-shadow: 0 2px 6px rgba(0,0,0,0.6); pointer-events: auto; }
  .hero-next {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 3;
  }
  .hero-next .btn-next { padding: .5rem .85rem; }
    </style>
</head>
<body>
    <!-- show the image fully (not as a background) with an overlaid heading -->
    <div class="hero">
      <img src="{% static 'images/bac.jpg' %}" alt="cover" class="hero-img img-fluid" />
      <div class="hero-next">
        <a href="{% url 'next_page' %}" target="_blank"><button class="btn-next">Next</button></a>
      </div>
      <div class="hero-heading">
        <h1>WEDDING INVITATION</h1>
      </div>
    </div>

    <div class="content-box container">

      <a href="{% url 'next_page' %}">Go to the next page</a>
      <p id="display"></p>
    </div>

  </body>
</html>
